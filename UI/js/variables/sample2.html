<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<script>
    var num1 = 50;
    var num2 = 30;
    var res;

    res = num1 + num2;
    alert("Result is : " + res);

    res = num1 - num2;
    alert("Result is : " + res);

    res = num1 * num2;
    alert("Result is : " + res);

    res = num1 / num2;
    alert("Result is : " + res);

</script>
<body>
    <h2>Sample JavaScript</h2>
</body>
</html>
